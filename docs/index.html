<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Lisk Network Checker</title>
</head>

<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        color: #fff;
        background-color: rgb(35, 45, 80);
        font-size: 0.8rem;
        height: 100vh;
        margin: 0px;
        padding: 75px 15px 15px 15px;
    }

    header {
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        width: 100%;
        height: 60px;
        line-height: 60px;
        position: fixed;
        top: 0;
        left: 0;
        background-color: rgb(15, 25, 60);
        z-index: 1000;
    }

    canvas {
        background-color: rgba(255, 255, 255, 0.05);
    }

    a,
    a:visited {
        color: rgb(200, 200, 235);
    }

    a:hover {
        color: rgb(150, 150, 245);
    }

    hr {
        border-top: solid 1px rgba(255, 255, 255, 0.25);
        border-bottom: none;
        border-left: none;
        border-right: none;
    }

    .btn {
        border-radius: 10px;
        border: 1px solid rgba(85, 85, 200, 0.9);
        background-color: rgba(50, 50, 145, 0.8);
        color: azure;
        padding: 10px 20px;
    }

    .btn:active {
        border: 1px solid rgba(50, 50, 145, 0.8);
        background-color: rgba(85, 85, 200, 0.9);
    }

    .main-title {
        font-size: 1.25rem;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .sub-title {
        font-size: 1rem;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .title {
        font-weight: bold;
    }

    .note {
        font-size: 0.8rem;
        font-weight: normal;
    }

    #status,
    #history {
        padding-left: 1rem;
    }

    #status-ping,
    #status-fetch,
    #history-ping,
    #history-fetch {
        margin-bottom: 10px;
    }

    .status-col,
    .history-col {
        padding: 3px 1rem;
    }

    .status-green {
        color: rgb(0, 155, 0);
        font-size: 1rem;
        font-weight: bold;
    }

    .status-red {
        color: rgb(165, 5, 5);
        font-size: 1rem;
        font-weight: bold;
    }

    .status-alert {
        font-weight: bold;
        color: rgb(165, 5, 5);
    }
</style>

<body>
    <header>Lisk Network Checker</header>
    <button type="button" class="btn" onclick="reload();">Reload</button>

    <div class="main-title" style="margin-top: 25px;">◆ Network Status</div>
    <div id="status">
        <div class="sub-title">Lisk Service API <span class="note">(timeout: 10sec.)</span></div>
        <div id="status-fetch">Loading...</div>
        <div class="sub-title" style="margin-top: 35px;">Host <span class="note">(timeout: 5sec.)</span></div>
        <div id="status-ping">Loading...</div>
    </div>

    <div class="main-title" style="margin-top: 35px;">◆ Network History</div>
    <div id="history">
        <div class="sub-title">Lisk Service API <span class="note">(timeout: 10sec.)</span></div>
        <div id="history-fetch">Loading...</div>
        <div class="sub-title" style="margin-top: 35px;">Host <span class="note">(timeout: 5sec.)</span></div>
        <div id="history-ping">Loading...</div>
    </div>

    <div style="padding-top: 75px; padding-bottom: 50px;">
        <a href="https://github.com/lisknonanika/lisk-network-checker" target="_blank" rel="noopener noreferrer">Source</a>
        &nbsp;/&nbsp;
        <a href="https://ysdev.work/lisk-network-check" target="_blank" rel="noopener noreferrer">API - check</a>
        &nbsp;/&nbsp;
        <a href="https://ysdev.work/lisk-network-history" target="_blank" rel="noopener noreferrer">API - history</a>
    </div>
    <script>
        const getStatus = async () => {
            const ret = await fetch("https://ysdev.work/lisk-network-check", { mode: 'cors' });
            const json = await ret.json();

            const pingdom = document.querySelector("#status-ping");
            pingdom.innerHTML = "";
            for (let ping of json.ping) {
                const pingrow = `
                <div class="title">${ping.alive ? "<span class='status-green'>●</span>" : "<span class='status-red'>●</span>"} ${ping.host}</div>
                <div class="status-col">ip: ${ping.ip}</div>
                <div class="status-col">check: ${changeTimestamp(ping.checkDate)}</div>
                <div class="status-col">response: ${ping.responseTime} ms.</div>
                <div class="status-col status-alert">${ping.downTime === 0 ? "" : `Down!(or Very Slow) about ${Math.round(ping.downTime / 60000)} min. ago`}</div>
                <hr />
                `;
                pingdom.innerHTML += pingrow;
            }

            const fetchdom = document.querySelector("#status-fetch");
            fetchdom.innerHTML = "";
            for (let fetch of json.fetch) {
                const fetchrow = `
                <div class="title">${fetch.alive ? "<span class='status-green'>●</span>" : "<span class='status-red'>●</span>"} ${fetch.url.replace("https://", "")}</div>
                <div class="status-col">status: ${fetch.status}</div>
                <div class="status-col">check: ${changeTimestamp(fetch.checkDate)}</div>
                <div class="status-col">response: ${fetch.responseTime} ms.</div>
                <div class="status-col status-alert">${fetch.downTime === 0 ? "" : `Down!(or Very Slow) about ${Math.round(fetch.downTime / 60000)} min. ago`}</div>
                <hr />
                `;
                fetchdom.innerHTML += fetchrow;
            }
        };

        const getHistory = async () => {
            const ret = await fetch("https://ysdev.work/lisk-network-history?limit=30", { mode: 'cors' });
            const json = await ret.json();

            const pingdom = document.querySelector("#history-ping");
            pingdom.innerHTML = "";
            for (let i = 0; i < json.ping.length; i++) {
                const ping = json.ping[i];
                const pingrow = `
                <div class="title" style="padding-left: 1rem;">${ping.host}</div>
                <div class="history-col" style="position:relative;height:250px;"><canvas id="ping-chart${i}"></canvas></div>
                <hr />
                `;
                pingdom.innerHTML += pingrow;
            }

            for (let i = 0; i < json.ping.length; i++) {
                const ping = json.ping[i];
                drawPingChart(ping, i);
            }

            const fetchdom = document.querySelector("#history-fetch");
            fetchdom.innerHTML = "";
            for (let i = 0; i < json.fetch.length; i++) {
                const fetch = json.fetch[i];
                const fetchrow = `
                <div class="title" style="padding-left: 1rem;">${fetch.url.replace("https://", "")}</div>
                <div class="history-col" style="position:relative;height:250px;"><canvas id="fetch-chart${i}"></canvas></div>
                <hr />
                `;
                fetchdom.innerHTML += fetchrow;
            }

            for (let i = 0; i < json.fetch.length; i++) {
                const fetch = json.fetch[i];
                drawFetchChart(fetch, i);
            }
        }

        const drawPingChart = (ping, idx) => {
            const timestamps = ping.data.map(data => changeTimestamp(data.timestamp));
            const responseTimes = ping.data.map(data => data.responseTime);
            const ctx = document.querySelector(`#ping-chart${idx}`);

            Chart.defaults.color = '#fff';
            Chart.defaults.font.size = 10;
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timestamps.reverse(),
                    datasets: [{
                        label: 'response time',
                        data: responseTimes.reverse(),
                        fill: false,
                        borderColor: 'rgb(75, 192, 192)'
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            title: { display: true, text: 'ms.' },
                            suggestedMin: 0,
                            suggestedMax: 500,
                            ticks: {
                                stepSize: 100
                            }
                        }
                    }
                }
            });
        }

        const drawFetchChart = (fetch, idx) => {
            const timestamps = fetch.data.map(data => changeTimestamp(data.timestamp));
            const responseTimes = fetch.data.map(data => data.responseTime);
            const ctx = document.querySelector(`#fetch-chart${idx}`);

            Chart.defaults.color = '#fff';
            Chart.defaults.font.size = 10;
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timestamps.reverse(),
                    datasets: [{
                        label: 'response time',
                        data: responseTimes.reverse(),
                        fill: false,
                        borderColor: 'rgb(75, 192, 192)'
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            title: { display: true, text: 'ms.' },
                            suggestedMin: 0,
                            suggestedMax: 10000,
                            ticks: {
                                stepSize: 2000
                            }
                        }
                    }
                }
            });
        }

        const reload = async () => {
            const pingStatusDom = document.querySelector("#status-ping");
            pingStatusDom.innerHTML = "Loading...";
            const fetchStatusDom = document.querySelector("#status-fetch");
            fetchStatusDom.innerHTML = "Loading...";
            getStatus();

            const pingHistoryDom = document.querySelector("#history-ping");
            pingHistoryDom.innerHTML = "Loading...";
            const fetchHistoryDom = document.querySelector("#history-fetch");
            fetchHistoryDom.innerHTML = "Loading...";
            getHistory();
        }

        const changeTimestamp = (d) => {
            const dt = new Date(d);
            return `${dt.toLocaleDateString()} ${dt.toLocaleTimeString()}`;
        }

        (async () => {
            getStatus();
            getHistory();
        })();
    </script>
</body>

</html>
